<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BASELINE_ — Raw Creatine Monohydrate</title>
<meta name="description" content="Raw creatine monohydrate. One ingredient, priced in the open. Baseline Supplies.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #0a0a09;
    --paper: #faf6ef;
    --signal: #f97316;
    --mist: rgba(250, 246, 239, 0.55);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--void);
    color: var(--paper);
    font-family: "JetBrains Mono", monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(1.5rem, 4vw, 3rem);
    -webkit-font-smoothing: antialiased;
  }

  :focus-visible {
    outline: 3px solid var(--signal);
    outline-offset: 4px;
  }

  .seizure {
    width: min(820px, 100%);
    animation: settle 1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .seizure__frame {
    position: relative;
    line-height: 0;
    display: flex;
    justify-content: center;
  }

  .seizure__frame img {
    max-width: 100%;
    max-height: 48vh;
    width: auto;
    height: auto;
    display: block;
  }

  /* photographic vignette so the frame melts into the page */
  .seizure__frame::after {
    content: "";
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 90px 50px var(--void);
    pointer-events: none;
  }

  .word {
    margin-top: clamp(1rem, 3vw, 2rem);
    text-align: center;
    animation: rise 0.9s 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  .word h1 {
    font-family: "Fraunces", serif;
    font-weight: 900;
    font-size: clamp(3rem, 11vw, 7.5rem);
    line-height: 1;
    letter-spacing: 0.01em;
    text-transform: uppercase;
  }

  .word h1 span { color: var(--signal); }

  .word__sub {
    margin-top: 1rem;
    font-size: clamp(0.7rem, 1.6vw, 0.85rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--mist);
  }

  .enter {
    margin-top: clamp(1.75rem, 4vw, 2.75rem);
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    min-height: 44px;
    padding: 0.4rem 0.2rem;
    color: var(--paper);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    border-bottom: 1px solid var(--signal);
    animation: rise 0.9s 0.55s cubic-bezier(0.22, 1, 0.36, 1) both;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .enter:hover { color: var(--signal); }
  .enter .arrow { transition: transform 0.2s ease; }
  .enter:hover .arrow { transform: translateX(5px); }

  @keyframes settle {
    from { opacity: 0; transform: scale(0.985); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .seizure, .word, .enter { animation: none; }
    .enter .arrow { transition: none; }
  }
</style>
</head>
<body>

<main class="seizure">
  <div class="seizure__frame">
    <img src="assets/creatine-bricks.jpg"
         alt="A press-conference pile of shrink-wrapped bricks, each stamped CREATINE, with officers standing behind it"
         width="1448" height="1086" fetchpriority="high">
  </div>

  <div class="word">
    <h1>Baseline<span>_</span></h1>
    <p class="word__sub">Raw monohydrate · 500g · $0.056 / gram · nothing else</p>
    <a href="home.html" class="enter">Enter the shop <span class="arrow">→</span></a>
  </div>
</main>

</body>
</html>
